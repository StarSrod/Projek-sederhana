<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi</title>
</head>
<body>
    <h1 style="text-align: center;">Pendaftaran Mahasiswa Baru</h1>
    <form action="" style="display: block; text-align: left; margin: 10px auto; width: 200px;">
        <label for="">Nama lengkap: </label>
        <input type="text" placeholder="Isi Nama Jir">
        <br>

        <label for="">Email Aktif: </label>
        <input type="email" name="" id="" placeholder="Isi Email Aktif">
        <br>

        <label for="">Password: </label>
        <input type="password" name="" id="" placeholder="Isi Password">
        <br>

        <label for="">Jenis Kelamin: </label>
        <input type="radio" name="gender" id="">
        <label for="male">Laki-laki</label>
        <input type="radio" name="gender" id="">
        <label for="female">Perempuan</label>
        <br>
        
        <label for="">Hobi:</label>
        <input type="checkbox" name="" id=""><label for="">Mancing</label>
        <input type="checkbox" name="" id=""><label for="">Otomotif</label>
        <input type="checkbox" name="" id=""><label for="">Baca Buku</label>
        <br>

        <label for="">Tanggal Lahir</label>
        <input type="date" name="" id="">
        <br>
        <input type="file" name="" id="">
        <br>
        <label for="">Alamat Lengkap</label>
        <textarea name="" id="" placeholder="Isi SU"></textarea>

        <br><br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
